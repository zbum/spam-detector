apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spam-detector
  namespace: spam-detector
  labels:
    app.kubernetes.io/name: spam-detector
  annotations:
    # /spam-detector/xxx → /xxx 로 rewrite
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # /spam-detector              → /
          # /spam-detector/healthz      → /healthz
          # /spam-detector/classify     → /classify
          - path: /spam-detector(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: spam-detector
                port:
                  number: 80
